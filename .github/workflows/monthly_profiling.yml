name: Scheduled Data Profiling Example

on:
  workflow_dispatch:

jobs:
  profile-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run configured profiles
        shell: bash
        run: |
          if [ ! -f schedule_config.csv ]; then
            echo "No schedule_config.csv is present. Generate and add one before enabling this workflow."
            exit 0
          fi
          python monthly_profiling_agent.py --all
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
      - name: Upload profiling outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-profiling-results-${{ github.run_id }}
          path: |
            scheduled_reports/
            run_log.jsonl
            profiling_history.jsonl
          if-no-files-found: ignore
          retention-days: 30
