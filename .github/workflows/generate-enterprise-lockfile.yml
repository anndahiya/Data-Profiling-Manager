name: Generate Enterprise UI Lockfile

on:
  pull_request:
    paths:
      - "enterprise-ui/package.json"
      - ".github/workflows/generate-enterprise-lockfile.yml"
  workflow_dispatch:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: enterprise-ui
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release-hardening-p0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npm install --package-lock-only --ignore-scripts --no-fund
      - name: Commit lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Add reproducible enterprise UI lockfile"
          git push origin HEAD:release-hardening-p0
