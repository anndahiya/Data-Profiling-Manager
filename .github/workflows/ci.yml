name: Test Data Profiling Manager

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run unit and Streamlit smoke tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee test-output-${{ matrix.python-version }}.txt
      - name: Upload complete test transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.python-version }}
          path: test-output-${{ matrix.python-version }}.txt
          if-no-files-found: error
          retention-days: 14
      - run: python -m compileall -q .
      - name: Import application modules
        run: >-
          python -c "import browser_storage, hosted_common, hosted_dashboard,
          hosted_profile_pages, hosted_analysis_pages, hosted_settings_pages,
          local_common, local_pages, data_profiler, ai_helper, snapshot_manager,
          schedule_helper, monthly_profiling_agent"
