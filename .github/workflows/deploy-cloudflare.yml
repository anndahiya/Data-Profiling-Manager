name: Deploy Enterprise UI to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - "enterprise-ui/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: enterprise-ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: npm
          cache-dependency-path: enterprise-ui/package-lock.json

      - name: Validate Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install frozen dependencies
        run: npm ci --no-fund

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Build production app
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: enterprise-ui
          command: deploy

      - name: Smoke test production route
        working-directory: .
        shell: bash
        env:
          PRODUCTION_URL: https://data-profiling-manager.ann-dahiya.workers.dev/overview
        run: |
          for attempt in {1..12}; do
            status=$(curl --location --silent --show-error --output /tmp/dpm.html --write-out "%{http_code}" "$PRODUCTION_URL" || true)
            if [ "$status" = "200" ] && grep -q '<div id="root"' /tmp/dpm.html; then
              echo "Production smoke test passed on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt returned HTTP $status; waiting for the deployment to propagate."
            sleep 5
          done
          echo "::error::The deployed /overview route did not return the application shell."
          cat /tmp/dpm.html 2>/dev/null || true
          exit 1
